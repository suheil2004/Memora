<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Memora</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="product-header">
        <span class="brand-mark" aria-hidden="true"></span>
        <div><h1>Memora</h1><p>Your memory layer for AI.</p></div>
      </header>
      <section aria-labelledby="connection-heading">
        <div class="section-heading">
          <h2 id="connection-heading">Connection</h2>
          <span id="connection-state" class="status-pill checking" aria-live="polite">
            <span aria-hidden="true"></span><span id="connection-label">Checking...</span>
          </span>
        </div>
        <form id="settings-form">
          <label for="backend-url">Backend URL</label>
          <input id="backend-url" type="url" autocomplete="url" required>
          <label for="local-token">Local authentication token</label>
          <input id="local-token" type="password" autocomplete="off" required>
          <button id="settings-submit" type="submit">Save settings</button>
        </form>
        <p id="status" class="helper" role="status" aria-live="polite"></p>
        <p class="privacy-note">Stored only in this Chrome profile. This is not your OpenAI API key.</p>
      </section>
      <section aria-labelledby="import-heading">
        <div class="section-heading"><h2 id="import-heading">Import memory</h2></div>
        <p class="section-copy">Import your ChatGPT data export to make previous conversations searchable through Memora.</p>
        <form id="import-form">
          <label for="import-files">ChatGPT export</label>
          <input id="import-files" type="file" accept=".json,.zip,application/json,application/zip" multiple required>
          <button id="import-submit" type="submit">Import history</button>
        </form>
        <div id="import-status" role="status" aria-live="polite"></div>
        <form id="document-import-form">
          <label for="document-files">Additional PDF documents</label>
          <input id="document-files" type="file" accept=".pdf,application/pdf" multiple required>
          <button id="document-import-submit" type="submit">Import additional PDFs</button>
        </form>
        <div id="document-import-status" role="status" aria-live="polite"></div>
        <p class="privacy-note">Your file is sent only to your local Memora backend.</p>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
