<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Memora Settings</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Memora</h1>
      <p>Local hackathon settings</p>
      <form id="settings-form">
        <label>Backend URL<input id="backend-url" type="url" required></label>
        <label>Demo user ID<input id="user-id" type="text" required></label>
        <button type="submit">Save</button>
      </form>
      <p id="status" role="status"></p>
      <small>This user ID is not authentication.</small>
      <hr>
      <h2>Import ChatGPT history</h2>
      <p>Select files from your ChatGPT data export. Files are sent only to your local Memora backend.</p>
      <form id="import-form">
        <label>Export files<input id="import-files" type="file" accept=".json,.zip,application/json,application/zip" multiple required></label>
        <button id="import-submit" type="submit">Import ChatGPT History</button>
      </form>
      <div id="import-status" role="status"></div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
